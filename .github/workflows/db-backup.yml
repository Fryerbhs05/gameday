name: Nightly DB backup

# Nightly logical backup of the Supabase Postgres `public` schema (all app data:
# users, magic_tokens, platform_sessions, user_profiles, league_connections,
# events, integration_requests, rate_limits). Supabase free tier has NO
# restorable backups, so this is our safety net.
#
# Bonus: the nightly DB connection counts as activity, so it also keeps the
# free-tier project from auto-pausing during any quiet stretch.
#
# Connection: host / port / user / db are hardcoded below (none are secret —
# only the password is). The connection goes through the Supabase SESSION POOLER
# (port 5432, IPv4) because GH runners are IPv4-only and the direct host is
# IPv6-only; the pooler username is the tenant-qualified `postgres.<ref>`.
#
# The password is passed via the PGPASSWORD env var (NOT embedded in a URL), so
# special characters in it need NO url-encoding and can't corrupt a connection
# string. This is the robust way.
#
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_DB_PASSWORD  — your Supabase database password, raw / verbatim
#   BACKUP_PASSPHRASE     — any strong passphrase; the dump is GPG-encrypted with
#                           it because it contains user emails / PII.

on:
  schedule:
    - cron: "37 7 * * *"   # 07:37 UTC daily (~3:37am ET). NOTE: GitHub cron is UTC.
  workflow_dispatch: {}     # lets you run it on demand to test

env:
  PGHOST: aws-1-us-east-1.pooler.supabase.com
  PGPORT: "5432"
  PGUSER: postgres.zmdldmfwfpsjwygrznwg
  PGDATABASE: postgres
  PGSSLMODE: require

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install PostgreSQL 17 client
        # The server is PG17; pg_dump must be >= the server version, so we pull
        # the client from the official PostgreSQL apt repo rather than use the
        # older default on the runner.
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Dump, compress, encrypt
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [ -z "${PGPASSWORD:-}" ] || [ -z "${BACKUP_PASSPHRASE:-}" ]; then
            echo "::error::Missing SUPABASE_DB_PASSWORD or BACKUP_PASSPHRASE secret."
            exit 1
          fi
          echo "Connecting as ${PGUSER}@${PGHOST}:${PGPORT}/${PGDATABASE} (password hidden)"
          STAMP="$(date -u +%Y%m%d-%H%M)"
          OUT="conflicted-${STAMP}.sql.gz.gpg"
          # Host/user/db/password all come from env (PG* vars) — no URL to parse,
          # so special chars in the password are passed verbatim and safe.
          # --no-owner / --no-privileges keep the dump restorable to any target.
          /usr/lib/postgresql/17/bin/pg_dump \
            --schema=public --no-owner --no-privileges \
            | gzip -9 \
            | gpg --batch --yes --symmetric --cipher-algo AES256 \
                  --passphrase "$BACKUP_PASSPHRASE" -o "$OUT"
          ls -lh "$OUT"
          echo "ARTIFACT_NAME=$OUT" >> "$GITHUB_ENV"

      - name: Upload encrypted backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}
          retention-days: 30   # rolling 30-day history; older runs auto-expire
