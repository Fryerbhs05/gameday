<svg xmlns="http://www.w3.org/2000/svg" width="480" height="130" viewBox="0 0 480 130" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Conflicted</title>
  <desc id="desc">The Conflicted wordmark, bisected vertically with the left half in navy and the right half in coral, with the tagline "All your leagues, one place" below.</desc>
  <defs>
    <clipPath id="leftHalf"><rect x="0" y="0" width="240" height="130"/></clipPath>
    <clipPath id="rightHalf"><rect x="240" y="0" width="240" height="130"/></clipPath>
  </defs>
  <text x="240" y="70" text-anchor="middle"
        style="font-family:'Inter',system-ui,-apple-system,sans-serif;font-weight:900;font-size:56px;letter-spacing:-0.04em;"
        fill="#1A3A52"
        clip-path="url(#leftHalf)">CONFLICTED</text>
  <text x="240" y="70" text-anchor="middle"
        style="font-family:'Inter',system-ui,-apple-system,sans-serif;font-weight:900;font-size:56px;letter-spacing:-0.04em;"
        fill="#D85A30"
        clip-path="url(#rightHalf)">CONFLICTED</text>
  <line x1="240" y1="22" x2="240" y2="82" stroke="#15181C" stroke-width="1.2"/>
  <text x="240" y="110" text-anchor="middle"
        style="font-family:'Inter',system-ui,-apple-system,sans-serif;font-weight:500;font-size:11px;letter-spacing:0.25em;"
        fill="#5F5E5A">ALL YOUR LEAGUES, ONE PLACE</text>
</svg>
