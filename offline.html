<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conflicted — Offline</title>
  <meta name="theme-color" content="#F5EFE4" />
  <!-- Favicon intentionally removed — the split-C mark is retired from this project. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy-700: #1A3A52;
      --coral-500: #D85A30;
      --paper: #F5EFE4;
      --paper-soft: #FAF6EC;
      --ink-700: #2C2C2A;
      --ink-500: #5F5E5A;
      --ink-900: #15181C;
      --line: #D8D2C4;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --paper: #0F1B26;
        --paper-soft: #162635;
        --ink-700: #E0DACA;
        --ink-500: #9E988A;
        --ink-900: #F5EFE4;
        --line: #2A3949;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--paper);
      color: var(--ink-700);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .wrap {
      max-width: 360px;
      text-align: center;
    }
    .logo {
      width: 96px;
      height: 96px;
      margin: 0 auto 32px;
      display: block;
    }
    h1 {
      font: 800 28px/1.15 var(--font-sans);
      letter-spacing: -0.01em;
      color: var(--ink-900);
      margin-bottom: 12px;
    }
    p {
      font: 400 15px/1.55 var(--font-sans);
      color: var(--ink-500);
      margin-bottom: 28px;
    }
    button {
      font: 600 14px/1 var(--font-sans);
      letter-spacing: 0.02em;
      color: var(--paper);
      background: var(--navy-700);
      border: none;
      border-radius: 999px;
      padding: 14px 28px;
      cursor: pointer;
      transition: background 200ms cubic-bezier(0.2, 0.8, 0.2, 1);
      -webkit-tap-highlight-color: transparent;
    }
    button:hover, button:active {
      background: var(--coral-500);
    }
    .status {
      margin-top: 24px;
      font: 500 11px/1.4 var(--font-sans);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-500);
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--coral-500);
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" aria-hidden="true">
      <g transform="translate(60, 60)">
        <path d="M 14 -36 A 42 42 0 1 0 14 36"
              fill="none" stroke="#1A3A52" stroke-width="16" stroke-linecap="round"/>
        <path d="M -14 -36 A 42 42 0 1 1 -14 36"
              fill="none" stroke="#D85A30" stroke-width="16" stroke-linecap="round"/>
      </g>
    </svg>
    <h1>You're offline</h1>
    <p>Conflicted needs an internet connection to pull live scores from your leagues. Reconnect and try again.</p>
    <button onclick="window.location.reload()">Try again</button>
    <div class="status"><span class="dot"></span>Waiting for connection</div>
  </div>
  <script>
    // Auto-retry the moment connectivity comes back.
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
